<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En Mantenimiento</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0c29;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Fondo animado con partículas */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Partículas flotantes */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Contenedor central */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 40px;
      max-width: 520px;
      width: 90%;
    }

    /* Engranaje animado */
    .gear-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 36px;
    }

    .gear {
      width: 80px;
      height: 80px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: spin 4s linear infinite;
    }

    .gear2 {
      width: 50px;
      height: 50px;
      top: 10%;
      left: 58%;
      animation: spin 4s linear infinite reverse;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .gear svg { width: 100%; height: 100%; fill: #a78bfa; filter: drop-shadow(0 0 8px #7c3aed); }
    .gear2 svg { fill: #60a5fa; filter: drop-shadow(0 0 6px #2563eb); }

    /* Texto */
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      text-shadow: 0 0 30px rgba(167,139,250,0.5);
    }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Barra de progreso pulsante */
    .bar-wrap {
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #7c3aed, #60a5fa, #7c3aed);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      width: 65%;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .bar-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Puntos parpadeantes */
    .dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      margin: 0 4px;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- Partículas generadas por JS -->
<div class="particles" id="particles"></div>

<div class="card">
  <div class="gear-wrap">
    <!-- Engranaje grande -->
    <div class="gear">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M43.3 5h13.4l2.2 10.3a32 32 0 0 1 7.8 3.2l9.5-4.6 9.5 9.5-4.6 9.5a32 32 0 0 1 3.2 7.8L95 43.3v13.4l-10.3 2.2a32 32 0 0 1-3.2 7.8l4.6 9.5-9.5 9.5-9.5-4.6a32 32 0 0 1-7.8 3.2L56.7 95H43.3l-2.2-10.3a32 32 0 0 1-7.8-3.2l-9.5 4.6-9.5-9.5 4.6-9.5a32 32 0 0 1-3.2-7.8L5 56.7V43.3l10.3-2.2a32 32 0 0 1 3.2-7.8L14 23.8l9.5-9.5 9.5 4.6a32 32 0 0 1 7.8-3.2L43.3 5zM50 33a17 17 0 1 0 0 34 17 17 0 0 0 0-34z"/>
      </svg>
    </div>
    <!-- Engranaje pequeño -->
    <div class="gear gear2">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M43.3 5h13.4l2.2 10.3a32 32 0 0 1 7.8 3.2l9.5-4.6 9.5 9.5-4.6 9.5a32 32 0 0 1 3.2 7.8L95 43.3v13.4l-10.3 2.2a32 32 0 0 1-3.2 7.8l4.6 9.5-9.5 9.5-9.5-4.6a32 32 0 0 1-7.8 3.2L56.7 95H43.3l-2.2-10.3a32 32 0 0 1-7.8-3.2l-9.5 4.6-9.5-9.5 4.6-9.5a32 32 0 0 1-3.2-7.8L5 56.7V43.3l10.3-2.2a32 32 0 0 1 3.2-7.8L14 23.8l9.5-9.5 9.5 4.6a32 32 0 0 1 7.8-3.2L43.3 5zM50 33a17 17 0 1 0 0 34 17 17 0 0 0 0-34z"/>
      </svg>
    </div>
  </div>

  <h1>En Mantenimiento</h1>
  <p>Estamos trabajando para mejorar tu experiencia.<br>Volvemos pronto.</p>

  <div class="bar-wrap">
    <div class="bar"></div>
  </div>
  <div class="bar-label">Trabajando en ello</div>

  <br><br>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
</div>

<script>
  // Generar partículas flotantes
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left     = Math.random() * 100 + 'vw';
    p.style.width    = (Math.random() * 4 + 2) + 'px';
    p.style.height   = p.style.width;
    p.style.animationDuration  = (Math.random() * 12 + 8) + 's';
    p.style.animationDelay     = (Math.random() * 10) + 's';
    p.style.opacity  = Math.random() * 0.5 + 0.1;
    container.appendChild(p);
  }
</script>
</body>
</html>
